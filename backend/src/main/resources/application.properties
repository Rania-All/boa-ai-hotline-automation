server.port=8081

# Database (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/boa_hotline}
spring.datasource.username=${DATABASE_USERNAME:boa}
spring.datasource.password=${DATABASE_PASSWORD:boa}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# FAQ
app.faq.excel-path=FAQ.xlsx

# Ollama (LLM)
ollama.enabled=true
ollama.base-url=http://localhost:11434
ollama.model=llama3.1
ollama.embedding-model=nomic-embed-text
ollama.timeout-ms=15000

# RPA UiPath (disabled by default)
uipath.enabled=false
uipath.base-url=
uipath.tenant=
uipath.account=
uipath.client-id=
uipath.client-secret=
uipath.folder-id=
uipath.release-key=

